<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 光束渐变 -->
    <linearGradient id="iconBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 桥梁渐变 -->
    <linearGradient id="iconBridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 透明背景 -->
  <rect width="400" height="400" fill="none"/>
  
  <!-- 桥梁结构 -->
  <g transform="translate(50, 200)">
    <!-- 左桥墩 -->
    <rect x="0" y="0" width="18" height="100" rx="4" fill="url(#iconBridge)" opacity="0.8"/>
    <circle cx="9" cy="0" r="10" fill="url(#iconBridge)" opacity="0.6" filter="url(#iconGlow)"/>
    
    <!-- 右桥墩 -->
    <rect x="274" y="0" width="18" height="100" rx="4" fill="url(#iconBridge)" opacity="0.8"/>
    <circle cx="283" cy="0" r="10" fill="url(#iconBridge)" opacity="0.6" filter="url(#iconGlow)"/>
    
    <!-- 桥面（弧形） -->
    <path d="M 9,10 Q 146,-25 283,10" stroke="url(#iconBridge)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#iconGlow)"/>
  </g>
  
  <!-- 光束穿过 -->
  <g filter="url(#iconGlow)">
    <!-- 主光束 -->
    <path d="M 70,140 L 330,200" stroke="url(#iconBeam)" stroke-width="4" fill="none" opacity="0.9"/>
    
    <!-- 光束散射 -->
    <line x1="330" y1="200" x2="370" y2="190" stroke="#fbbf24" stroke-width="2.5" opacity="0.7"/>
    <line x1="330" y1="200" x2="380" y2="200" stroke="#fbbf24" stroke-width="2.5" opacity="0.7"/>
    <line x1="330" y1="200" x2="370" y2="210" stroke="#fbbf24" stroke-width="2.5" opacity="0.7"/>
    
    <!-- 光点 -->
    <circle cx="170" cy="165" r="5" fill="#ffffff" filter="url(#iconGlow)" opacity="0.9"/>
    <circle cx="240" cy="185" r="4" fill="#ffffff" filter="url(#iconGlow)" opacity="0.7"/>
  </g>
  
  <!-- 连接节点 -->
  <g filter="url(#iconGlow)">
    <circle cx="60" cy="130" r="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5"/>
    <circle cx="360" cy="190" r="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5"/>
    <circle cx="360" cy="210" r="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2.5"/>
  </g>
  
  <!-- 装饰光晕 -->
  <circle cx="70" cy="140" r="15" fill="#fbbf24" opacity="0.1" filter="url(#iconGlow)"/>
  <circle cx="330" cy="200" r="18" fill="#fbbf24" opacity="0.12" filter="url(#iconGlow)"/>
</svg>
